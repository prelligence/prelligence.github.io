<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Montserrat Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 20px;
      animation: fadeIn 1.2s ease-out;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 10px;
      margin: 0;
      font-weight: 800;
    }

    .tagline {
      margin-top: 30px;
      font-size: 22px;
      line-height: 1.5;
      color: #cccccc;
    }

    .coming {
      margin-top: 40px;
      font-size: 14px;
      letter-spacing: 4px;
      color: #888;
      animation: blink 2s infinite;
    }

    .contact {
      margin-top: 50px;
      font-size: 16px;
      color: #aaa;
    }

    .contact a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #444;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.2; }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 40px;
        letter-spacing: 5px;
      }

      .tagline {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>PRELLIGENCE</h1>

    <div class="tagline">
      Unlocking the Economic Potential of Critical Infrastructure<br>
      through Electrical Signal Intelligence
    </div>

    <div class="coming">
      COMING SOON...
    </div>

    <div class="contact">
      <a href="mailto:your@email.com">your@email.com</a>
    </div>

  </div>

</body>
</html>
